spring:
  application:
    name: cine-booking

  # ===== Datasource (MariaDB) =====
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cine_booking}
    username: ${DB_USER:cine}
    password: ${DB_PASSWORD:cine}
    driver-class-name: org.mariadb.jdbc.Driver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

# ===== Aplicação =====
app:
  cors:
    # Lista separada por vírgula. Sobrescreva via env CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  tickets:
    expiration:
      # Intervalo com que o scheduler expira reservas PENDING vencidas (duração: 10m, 30s, 1h...).
      check-rate: 10m
